name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: goodz
    steps:
      - uses: actions/checkout@v7
        with:
          path: goodz

      - uses: pnpm/action-setup@v6
        with:
          package_json_file: goodz/package.json

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: goodz/pnpm-lock.yaml

      - name: Cache Turborepo
        uses: actions/cache@v6
        with:
          path: goodz/.turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('goodz/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('goodz/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      - name: Verify workspace, process, template, build, and lint
        run: pnpm verify
