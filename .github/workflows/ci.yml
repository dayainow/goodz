name: CI
on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  verify:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: goodz
    steps:
      - uses: actions/checkout@v4
        with:
          path: goodz

      # web-shop의 file: 의존성이 참조하는 형제 리포를 함께 체크아웃
      - name: Checkout ga-analytics-harness
        uses: actions/checkout@v4
        with:
          repository: dayainow/ga-analytics-harness
          path: ga-analytics-harness

      - uses: pnpm/action-setup@v4
        with:
          package_json_file: goodz/package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: goodz/pnpm-lock.yaml

      - name: Cache Turborepo
        uses: actions/cache@v4
        with:
          path: goodz/.turbo/cache
          key: ${{ runner.os }}-turbo-${{ hashFiles('goodz/pnpm-lock.yaml') }}-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-${{ hashFiles('goodz/pnpm-lock.yaml') }}-
            ${{ runner.os }}-turbo-

      - run: pnpm install --frozen-lockfile

      - name: Workspace + dependency + process checks
        run: pnpm check:workspace && pnpm check:deps && pnpm check:process

      - name: Build + Lint
        run: pnpm turbo build && pnpm turbo lint
